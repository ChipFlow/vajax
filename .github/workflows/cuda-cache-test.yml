name: CUDA Cache Restore Test (GPU Runner)

on:
  workflow_dispatch:
  push:
    branches: [debug/cuda-cache-test]

# Only one job at a time on the GPU runner
concurrency:
  group: cuda-cache-test
  cancel-in-progress: false

jobs:
  apt_upgrade_analysis:
    runs-on: nvidia-runner-1
    timeout-minutes: 30
    name: Analyse apt install behavior (new vs upgrade vs recommends)
    steps:
      - name: Runner baseline
        run: |
          echo "=== Runner info ==="
          uname -a
          cat /etc/os-release | head -3
          echo ""
          echo "=== Pre-installed package count ==="
          dpkg-query -W -f='${Package}\n' | wc -l
          echo ""
          echo "=== Pre-installed gcc-14-base ==="
          dpkg -s gcc-14-base 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(not installed)"
          dpkg -s gcc-14-base:i386 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(no i386 variant)"
          echo ""
          echo "=== Packages with pending upgrades ==="
          apt list --upgradable 2>/dev/null | head -30 || true
        shell: bash

      - name: Simulate cuda-nvcc-12-6 install
        run: |
          sudo apt-get update -qq

          # Upgrade lines: "Inst pkg [old_ver] (new_ver repo [arch])"
          # New install:   "Inst pkg (new_ver repo [arch])"
          echo "=== apt-get install --simulate --show-upgraded cuda-nvcc-12-6 ==="
          sudo apt-get install --simulate --show-upgraded cuda-nvcc-12-6 2>&1 | tee /tmp/simulate-default.txt
          echo ""

          echo "=== Summary ==="
          echo "New installs: $(grep "^Inst " /tmp/simulate-default.txt | grep -cv "^Inst [^ ]* \[" || echo 0)"
          echo "Upgrades:     $(grep -c "^Inst [^ ]* \[" /tmp/simulate-default.txt || echo 0)"
          echo ""
          echo "Upgraded packages:"
          grep "^Inst [^ ]* \[" /tmp/simulate-default.txt || echo "(none)"
          echo ""

          echo "=== With --no-install-recommends ==="
          sudo apt-get install --simulate --show-upgraded --no-install-recommends cuda-nvcc-12-6 2>&1 | tee /tmp/simulate-no-recommends.txt
          echo ""
          echo "New installs: $(grep "^Inst " /tmp/simulate-no-recommends.txt | grep -cv "^Inst [^ ]* \[" || echo 0)"
          echo "Upgrades:     $(grep -c "^Inst [^ ]* \[" /tmp/simulate-no-recommends.txt || echo 0)"
        shell: bash

      - name: Simulate cuda-toolkit-12-6 install (full toolkit)
        run: |
          echo "=== apt-get install --simulate --show-upgraded cuda-toolkit-12-6 ==="
          sudo apt-get install --simulate --show-upgraded cuda-toolkit-12-6 2>&1 | tee /tmp/simulate-toolkit.txt
          echo ""

          echo "=== Summary ==="
          TOTAL=$(grep -c "^Inst " /tmp/simulate-toolkit.txt || echo 0)
          NEW=$(grep "^Inst " /tmp/simulate-toolkit.txt | grep -cv "^Inst [^ ]* \[" || echo 0)
          UPG=$(grep -c "^Inst [^ ]* \[" /tmp/simulate-toolkit.txt || echo 0)
          echo "Total: ${TOTAL}  (New: ${NEW}, Upgrades: ${UPG})"
          echo ""
          echo "Upgraded packages:"
          grep "^Inst [^ ]* \[" /tmp/simulate-toolkit.txt || echo "(none)"
          echo ""

          echo "=== With --no-install-recommends ==="
          sudo apt-get install --simulate --show-upgraded --no-install-recommends cuda-toolkit-12-6 2>&1 | tee /tmp/simulate-toolkit-no-rec.txt
          echo ""
          TOTAL_NR=$(grep -c "^Inst " /tmp/simulate-toolkit-no-rec.txt || echo 0)
          NEW_NR=$(grep "^Inst " /tmp/simulate-toolkit-no-rec.txt | grep -cv "^Inst [^ ]* \[" || echo 0)
          UPG_NR=$(grep -c "^Inst [^ ]* \[" /tmp/simulate-toolkit-no-rec.txt || echo 0)
          echo "Total: ${TOTAL_NR}  (New: ${NEW_NR}, Upgrades: ${UPG_NR})"
          echo ""

          echo "=== Recommends-only packages (${TOTAL} - ${TOTAL_NR} = $((TOTAL - TOTAL_NR))) ==="
          comm -13 \
            <(grep "^Inst " /tmp/simulate-toolkit-no-rec.txt | awk '{print $2}' | sort) \
            <(grep "^Inst " /tmp/simulate-toolkit.txt | awk '{print $2}' | sort) \
            | head -60
        shell: bash

      - name: Simulate vajax full package list
        run: |
          PKGS="llvm-18-dev clang-18 libclang-18-dev lld-18 libsuitesparse-dev libopenblas-dev swig cmake cuda-toolkit-12-6 cuda-nsight-systems-12-6 libcudnn9-cuda-12 libcudss0-cuda-12 pkg-config"

          echo "=== apt-get install --simulate --show-upgraded ${PKGS} ==="
          sudo apt-get install --simulate --show-upgraded ${PKGS} 2>&1 | tee /tmp/simulate-vajax.txt
          echo ""

          TOTAL=$(grep -c "^Inst " /tmp/simulate-vajax.txt || echo 0)
          NEW=$(grep "^Inst " /tmp/simulate-vajax.txt | grep -cv "^Inst [^ ]* \[" || echo 0)
          UPG=$(grep -c "^Inst [^ ]* \[" /tmp/simulate-vajax.txt || echo 0)
          echo "=== Summary ==="
          echo "Total: ${TOTAL}  (New: ${NEW}, Upgrades: ${UPG})"
          echo ""
          echo "Upgraded packages:"
          grep "^Inst [^ ]* \[" /tmp/simulate-vajax.txt || echo "(none)"
          echo ""

          echo "=== With --no-install-recommends ==="
          sudo apt-get install --simulate --show-upgraded --no-install-recommends ${PKGS} 2>&1 | tee /tmp/simulate-vajax-no-rec.txt
          echo ""
          TOTAL_NR=$(grep -c "^Inst " /tmp/simulate-vajax-no-rec.txt || echo 0)
          NEW_NR=$(grep "^Inst " /tmp/simulate-vajax-no-rec.txt | grep -cv "^Inst [^ ]* \[" || echo 0)
          UPG_NR=$(grep -c "^Inst [^ ]* \[" /tmp/simulate-vajax-no-rec.txt || echo 0)
          echo "Total: ${TOTAL_NR}  (New: ${NEW_NR}, Upgrades: ${UPG_NR})"
          echo ""

          echo "=== Recommends-only packages (${TOTAL} - ${TOTAL_NR} = $((TOTAL - TOTAL_NR))) ==="
          comm -13 \
            <(grep "^Inst " /tmp/simulate-vajax-no-rec.txt | awk '{print $2}' | sort) \
            <(grep "^Inst " /tmp/simulate-vajax.txt | awk '{print $2}' | sort) \
            | head -80
        shell: bash

      - name: Simulate with apt-mark hold (prevents upgrades)
        run: |
          PKGS="llvm-18-dev clang-18 libclang-18-dev lld-18 libsuitesparse-dev libopenblas-dev swig cmake cuda-toolkit-12-6 cuda-nsight-systems-12-6 libcudnn9-cuda-12 libcudss0-cuda-12 pkg-config"

          echo "=== Holding all installed packages ==="
          dpkg-query -W -f='${Package}\n' > /tmp/held.txt
          sudo xargs apt-mark hold < /tmp/held.txt > /dev/null 2>&1
          echo "Held $(wc -l < /tmp/held.txt) packages"
          echo ""

          echo "=== apt-get install --simulate --show-upgraded (with holds) ==="
          sudo apt-get install --simulate --show-upgraded ${PKGS} 2>&1 | tee /tmp/simulate-held.txt
          echo ""

          TOTAL=$(grep -c "^Inst " /tmp/simulate-held.txt || echo 0)
          NEW=$(grep "^Inst " /tmp/simulate-held.txt | grep -cv "^Inst [^ ]* \[" || echo 0)
          UPG=$(grep -c "^Inst [^ ]* \[" /tmp/simulate-held.txt || echo 0)
          echo "=== Summary (with holds) ==="
          echo "Total: ${TOTAL}  (New: ${NEW}, Upgrades: ${UPG})"
          echo ""

          echo "=== Comparison ==="
          echo "Without holds: 242 total (216 new, 26 upgrades)"
          echo "With holds:    ${TOTAL} total (${NEW} new, ${UPG} upgrades)"
          echo "Saved: $((242 - TOTAL)) packages"

          # Clean up holds
          sudo xargs apt-mark unhold < /tmp/held.txt > /dev/null 2>&1
        shell: bash
