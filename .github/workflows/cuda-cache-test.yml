name: CUDA Cache Restore Test (GPU Runner)

on:
  workflow_dispatch:
  push:
    branches: [debug/cuda-cache-test]

# Only one job at a time on the GPU runner
concurrency:
  group: cuda-cache-test
  cancel-in-progress: false

env:
  SHELLOPTS: errexit:pipefail

jobs:
  apt_upgrade_analysis:
    runs-on: nvidia-runner-1
    timeout-minutes: 30
    name: Analyse apt install behavior (new vs upgrade vs recommends)
    steps:
      - name: Runner baseline
        run: |
          echo "=== Runner info ==="
          uname -a
          cat /etc/os-release | head -3
          echo ""
          echo "=== Pre-installed package count ==="
          dpkg-query -W -f='${Package}\n' | wc -l
          echo ""
          echo "=== Pre-installed gcc-14-base ==="
          dpkg -s gcc-14-base 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(not installed)"
          dpkg -s gcc-14-base:i386 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(no i386 variant)"
        shell: bash

      - name: Simulate cuda-nvcc-12-6 install
        run: |
          sudo apt-get update -qq

          echo "=== apt-get install --simulate cuda-nvcc-12-6 ==="
          sudo apt-get install --simulate cuda-nvcc-12-6 2>&1 | tee /tmp/simulate-default.txt
          echo ""

          echo "=== Summary: Inst (new) vs Inst (upgrade) ==="
          echo "New installs:"
          grep "^Inst " /tmp/simulate-default.txt | grep -v '\[' | wc -l
          grep "^Inst " /tmp/simulate-default.txt | grep -v '\[' | head -20
          echo ""
          echo "Upgrades (have existing version in [brackets]):"
          grep "^Inst " /tmp/simulate-default.txt | grep '\[' | wc -l
          grep "^Inst " /tmp/simulate-default.txt | grep '\[' | head -20
          echo ""

          echo "=== With --no-install-recommends ==="
          sudo apt-get install --simulate --no-install-recommends cuda-nvcc-12-6 2>&1 | tee /tmp/simulate-no-recommends.txt
          echo ""
          echo "New installs (no recommends):"
          grep "^Inst " /tmp/simulate-no-recommends.txt | grep -v '\[' | wc -l
          echo "Upgrades (no recommends):"
          grep "^Inst " /tmp/simulate-no-recommends.txt | grep '\[' | wc -l
        shell: bash

      - name: Simulate cuda-toolkit-12-6 install (full toolkit)
        run: |
          echo "=== apt-get install --simulate cuda-toolkit-12-6 ==="
          sudo apt-get install --simulate cuda-toolkit-12-6 2>&1 | tee /tmp/simulate-toolkit.txt
          echo ""

          echo "=== Summary ==="
          echo "Total packages:"
          grep "^Inst " /tmp/simulate-toolkit.txt | wc -l
          echo ""
          echo "New installs:"
          grep "^Inst " /tmp/simulate-toolkit.txt | grep -v '\[' | wc -l
          echo ""
          echo "Upgrades:"
          UPGRADES=$(grep "^Inst " /tmp/simulate-toolkit.txt | grep '\[' || true)
          echo "$UPGRADES" | wc -l
          echo "$UPGRADES"
          echo ""

          echo "=== With --no-install-recommends ==="
          sudo apt-get install --simulate --no-install-recommends cuda-toolkit-12-6 2>&1 | tee /tmp/simulate-toolkit-no-rec.txt
          echo ""
          echo "Total (no recommends):"
          grep "^Inst " /tmp/simulate-toolkit-no-rec.txt | wc -l
          echo "New installs (no recommends):"
          grep "^Inst " /tmp/simulate-toolkit-no-rec.txt | grep -v '\[' | wc -l
          echo "Upgrades (no recommends):"
          grep "^Inst " /tmp/simulate-toolkit-no-rec.txt | grep '\[' | wc -l
          echo ""

          echo "=== Packages ONLY in default (i.e. Recommends) ==="
          diff <(grep "^Inst " /tmp/simulate-toolkit-no-rec.txt | awk '{print $2}' | sort) \
               <(grep "^Inst " /tmp/simulate-toolkit.txt | awk '{print $2}' | sort) \
               | grep "^>" | sed 's/^> /  /' | head -40
        shell: bash

      - name: Simulate vajax full package list
        run: |
          echo "=== Simulating the full vajax package list ==="
          PKGS="llvm-18-dev clang-18 libclang-18-dev lld-18 libsuitesparse-dev libopenblas-dev swig cmake cuda-toolkit-12-6 cuda-nsight-systems-12-6 libcudnn9-cuda-12 libcudss0-cuda-12 pkg-config"

          sudo apt-get install --simulate ${PKGS} 2>&1 | tee /tmp/simulate-vajax.txt
          echo ""
          echo "Total: $(grep "^Inst " /tmp/simulate-vajax.txt | wc -l)"
          echo "New:   $(grep "^Inst " /tmp/simulate-vajax.txt | grep -v '\[' | wc -l)"
          echo "Upgrades: $(grep "^Inst " /tmp/simulate-vajax.txt | grep '\[' | wc -l)"
          echo ""
          echo "Upgraded packages:"
          grep "^Inst " /tmp/simulate-vajax.txt | grep '\[' || echo "(none)"
          echo ""

          sudo apt-get install --simulate --no-install-recommends ${PKGS} 2>&1 | tee /tmp/simulate-vajax-no-rec.txt
          echo ""
          echo "=== With --no-install-recommends ==="
          echo "Total: $(grep "^Inst " /tmp/simulate-vajax-no-rec.txt | wc -l)"
          echo "New:   $(grep "^Inst " /tmp/simulate-vajax-no-rec.txt | grep -v '\[' | wc -l)"
          echo "Upgrades: $(grep "^Inst " /tmp/simulate-vajax-no-rec.txt | grep '\[' | wc -l)"
          echo ""

          echo "=== Recommends-only packages ==="
          diff <(grep "^Inst " /tmp/simulate-vajax-no-rec.txt | awk '{print $2}' | sort) \
               <(grep "^Inst " /tmp/simulate-vajax.txt | awk '{print $2}' | sort) \
               | grep "^>" | sed 's/^> /  /' | head -60
        shell: bash
