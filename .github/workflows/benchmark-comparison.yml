name: Benchmark Comparison

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  JAX_COMPILATION_CACHE_DIR: /tmp/jax-xla-cache

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        solver: [dense, sparse]
        platform: [cpu, cuda]
        include:
          - solver: dense
            benchmarks: "rc,graetz,mul,ring,tb_dp"
          - solver: sparse
            benchmarks: "c6288,mul64"
          - platform: cpu
            runner: ubuntu-latest
          - platform: cuda
            runner: nvidia-runner-1

    name: benchmark (${{ matrix.solver }}-${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.solver == 'sparse' && matrix.platform == 'cuda' && 360 || 90 }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── CUDA diagnostics ─────────────────────────────────────────
      - name: CUDA environment diagnostics
        if: matrix.platform == 'cuda'
        run: |
          echo "=== GPU Info ==="
          nvidia-smi || echo "nvidia-smi not available"
          echo ""
          echo "=== CUDA Version ==="
          nvcc --version 2>/dev/null || echo "nvcc not in PATH"

      # ── System dependencies ──────────────────────────────────────
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-v1
          restore-keys: |
            apt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-

      - name: Install system dependencies (CPU)
        if: matrix.platform == 'cpu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            flex bison libfl-dev \
            libsuitesparse-dev libopenblas-dev \
            ccache bc

      - name: Install system dependencies (CUDA)
        if: matrix.platform == 'cuda'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config swig \
            libsuitesparse-dev libopenblas-dev

      # ── LLVM 18 (idempotent, works on all runners) ──────────────
      - name: Install LLVM 18
        run: |
          if ! llvm-config-18 --version 2>/dev/null; then
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
              sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
            sudo chmod a+r /etc/apt/trusted.gpg.d/apt.llvm.org.asc
            wget -q https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh 18
            rm llvm.sh
          fi
          sudo apt-get install -y lld-18
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      # ── Rust toolchain ───────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        if: matrix.platform == 'cuda'
        uses: mozilla-actions/sccache-action@v0.0.7
        with:
          disable_annotations: true

      - name: Enable sccache for Rust
        if: matrix.platform == 'cuda'
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      # ── Build caches ─────────────────────────────────────────────
      - name: Cache ccache
        if: matrix.platform == 'cpu'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        if: matrix.platform == 'cpu'
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            openvaf_jax/openvaf_py
            vendor/OpenVAF

      # ── CUDA toolkit ─────────────────────────────────────────────
      - name: Install CUDA toolkit
        if: matrix.platform == 'cuda'
        run: |
          sudo apt-get install -y cuda-toolkit-12-6 libcudnn9-cuda-12 libcudss0-cuda-12
          echo "/usr/local/cuda-12.6/bin" >> "$GITHUB_PATH"
          CUDSS_LIB=$(dpkg -L libcudss0-cuda-12 | grep '\.so' | head -1)
          if [ -n "$CUDSS_LIB" ]; then
            CUDSS_DIR=$(dirname "$CUDSS_LIB")
            echo "LD_LIBRARY_PATH=${CUDSS_DIR}:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
            echo "cuDSS library found at: $CUDSS_LIB"
          fi

      # ── Python environment ──────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache XLA compilation artifacts
        uses: actions/cache@v4
        with:
          path: /tmp/jax-xla-cache
          key: xla-cache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.solver }}-${{ matrix.platform }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            xla-cache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.solver }}-${{ matrix.platform }}-
            xla-cache-${{ runner.os }}-${{ runner.arch }}-

      # ── Build openvaf-py ─────────────────────────────────────────
      - name: Build openvaf-py
        working-directory: openvaf_jax/openvaf_py
        run: |
          uv sync
          uv run maturin develop --release

      # ── Build openvaf-r (CPU only, for VACASK OSDI compilation) ─
      - name: Build openvaf-r
        if: matrix.platform == 'cpu'
        working-directory: vendor/OpenVAF
        run: |
          cargo build --release -p openvaf-driver --bin openvaf-r --no-default-features --features llvm18
          echo "OPENVAF_DIR=${{ github.workspace }}/vendor/OpenVAF/target/release" >> "$GITHUB_ENV"

      # ── Install vajax ────────────────────────────────────────────
      - name: Install vajax (CPU)
        if: matrix.platform == 'cpu'
        run: uv sync --extra dev --extra umfpack

      - name: Install vajax (CUDA)
        if: matrix.platform == 'cuda'
        run: uv sync --extra cuda12 --extra test --extra umfpack

      - name: Build UMFPACK FFI extension
        working-directory: vajax/sparse
        run: |
          uv pip install scikit-build-core nanobind
          uv pip install --no-build-isolation .

      # ── Run VAJAX unit tests (CPU dense only) ────────────────────
      - name: Run VAJAX tests
        if: matrix.platform == 'cpu' && matrix.solver == 'dense'
        env:
          JAX_PLATFORMS: cpu
        run: uv run pytest tests/test_vacask_suite.py tests/test_vacask_jax.py -v --tb=short

      # ── Build VACASK (CPU only) ─────────────────────────────────
      - name: Cache Boost 1.88
        if: matrix.platform == 'cpu'
        uses: actions/cache@v4
        id: cache-boost
        with:
          path: /tmp/boost_1_88_0
          key: boost-1.88.0-${{ runner.os }}

      - name: Download and build Boost 1.88
        if: matrix.platform == 'cpu' && steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          wget -q https://archives.boost.io/release/1.88.0/source/boost_1_88_0.tar.gz
          tar -xzf boost_1_88_0.tar.gz
          cd boost_1_88_0
          ./bootstrap.sh --with-libraries=filesystem,process,system
          ./b2 -j"$(nproc)" link=static

      - name: Download toml++ 3.4.0
        if: matrix.platform == 'cpu'
        run: |
          cd /tmp
          wget -q https://github.com/marzer/tomlplusplus/archive/refs/tags/v3.4.0.tar.gz
          tar -xzf v3.4.0.tar.gz

      - name: Cache VACASK build
        if: matrix.platform == 'cpu'
        uses: actions/cache@v4
        id: cache-vacask
        with:
          path: vendor/VACASK/build
          key: vacask-build-${{ runner.os }}-${{ hashFiles('vendor/VACASK/CMakeLists.txt', 'vendor/VACASK/lib/**', 'vendor/VACASK/simulator/**', 'vendor/VACASK/devices/**', 'vendor/OpenVAF/Cargo.lock') }}

      - name: Build VACASK
        if: matrix.platform == 'cpu' && steps.cache-vacask.outputs.cache-hit != 'true'
        run: |
          cd vendor/VACASK
          mkdir -p build && cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBoost_NO_SYSTEM_PATHS=TRUE \
            -DBoost_INCLUDE_DIR=/tmp/boost_1_88_0 \
            -DCMAKE_PREFIX_PATH="/tmp/boost_1_88_0/stage/lib/cmake" \
            -DTOMLPP_DIR=/tmp/tomlplusplus-3.4.0 \
            -DOPENVAF_DIR="${OPENVAF_DIR}"
          ninja -j"$(nproc)" vacask
          ninja -j"$(nproc)" build_and_stage_devices || {
            echo "Warning: OSDI device compilation failed"
            echo "=== OpenVAF crash logs ==="
            cat /tmp/openvaf-crash-*.log 2>/dev/null || echo "No crash logs found"
          }
          echo "=== ccache stats ==="
          ccache -s

      # ── VACASK comparison tests (CPU dense only) ─────────────────
      - name: Run VACASK result comparison tests
        if: matrix.platform == 'cpu' && matrix.solver == 'dense'
        timeout-minutes: 90
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
          VACASK_BIN: ${{ github.workspace }}/vendor/VACASK/build/simulator/vacask
          VAJAX_MAX_STEPS: "10000"
          VAJAX_NO_PROGRESS: "1"
          JAX_LOG_COMPILES: "1"
          JAX_EXPLAIN_CACHE_MISSES: "1"
        run: |
          echo "Running automated VACASK result comparison tests..."
          echo "Note: Limiting to 10k steps per benchmark for CI (full run uses up to 1M)"
          uv run pytest tests/test_vacask_benchmarks.py -v \
            -k "TestVACASKResultComparison" \
            --tb=long --log-cli-level=INFO 2>&1 | tee /tmp/vacask-result-tests.log

      - name: Summarize XLA compilation times
        if: always() && matrix.platform == 'cpu' && matrix.solver == 'dense'
        run: |
          echo "=== XLA Compilation Summary ==="
          echo "Top 20 slowest XLA compilations:"
          grep "Finished XLA compilation" /tmp/vacask-result-tests.log 2>/dev/null | \
            sed 's/.*of jit(\([^)]*\)) in \([0-9.]*\) sec.*/\2 \1/' | \
            sort -rn | head -20 || echo "No XLA compilation data found"
          echo ""
          echo "Total compilations: $(grep -c "Finished XLA compilation" /tmp/vacask-result-tests.log 2>/dev/null || echo 0)"
          echo "Cache hits: $(grep -c "Persistent compilation cache hit" /tmp/vacask-result-tests.log 2>/dev/null || echo 0)"
          echo "Cache misses: $(grep -c "PERSISTENT COMPILATION CACHE MISS" /tmp/vacask-result-tests.log 2>/dev/null || echo 0)"

      # ── GPU verification (CUDA only) ────────────────────────────
      - name: Verify JAX GPU detection
        if: matrix.platform == 'cuda'
        env:
          JAX_PLATFORMS: cuda,cpu
        run: |
          uv run python -c "
          import jax
          print('JAX version:', jax.__version__)
          print('JAX backend:', jax.default_backend())
          print('JAX devices:', jax.devices())
          gpu_devices = [d for d in jax.devices() if d.platform != 'cpu']
          if gpu_devices:
              print('GPU devices found:', gpu_devices)
              print('GPU device kind:', gpu_devices[0].device_kind)
          else:
              print('ERROR: No GPU devices found')
              raise SystemExit(1)
          "

      - name: Verify Spineax/cuDSS availability
        if: matrix.platform == 'cuda'
        env:
          JAX_PLATFORMS: cuda,cpu
        run: |
          uv run python -c "
          import sys
          print('Python:', sys.version)

          try:
              from spineax.cudss.solver import CuDSSSolver
              print('cuDSS solver imported successfully')
          except ImportError as e:
              print(f'cuDSS import failed: {e}')
          except Exception as e:
              print(f'cuDSS import error: {type(e).__name__}: {e}')

          try:
              import spineax
              print(f'spineax location: {spineax.__file__}')
              import spineax.cudss
              print(f'spineax.cudss location: {spineax.cudss.__file__}')
          except Exception as e:
              print(f'spineax structure error: {e}')

          from vajax.analysis.spineax_solver import is_spineax_available
          print('is_spineax_available():', is_spineax_available())
          "

      # ── Run benchmarks ──────────────────────────────────────────
      - name: Run benchmarks
        env:
          JAX_PLATFORMS: ${{ matrix.platform == 'cuda' && 'cuda,cpu' || 'cpu' }}
          JAX_ENABLE_X64: "1"
          VAJAX_NO_PROGRESS: "1"
          JAX_LOG_COMPILES: "1"
          XLA_FLAGS: ${{ matrix.platform == 'cuda' && '--xla_gpu_autotune_level=0' || '' }}
          XLA_PYTHON_CLIENT_PREALLOCATE: ${{ matrix.platform == 'cuda' && 'false' || '' }}
          XLA_PYTHON_CLIENT_ALLOCATOR: ${{ matrix.platform == 'cuda' && 'platform' || '' }}
          TF_CPP_MIN_LOG_LEVEL: ${{ matrix.platform == 'cuda' && '2' || '' }}
          VACASK_BIN: ${{ github.workspace }}/vendor/VACASK/build/simulator/vacask
        run: |
          SPARSE_FLAG=""
          GPU_FLAG=""
          PROFILE_FLAGS=""

          if [ "${{ matrix.solver }}" = "sparse" ]; then
            SPARSE_FLAG="--use-sparse"
          fi

          if [ "${{ matrix.platform }}" = "cuda" ]; then
            GPU_FLAG="--force-gpu --analyze"
            if [ "${{ matrix.solver }}" = "sparse" ]; then
              PROFILE_FLAGS="--profile-mode jax --profile-dir /tmp/vajax-traces"
            fi
          fi

          echo "Running benchmarks (${{ matrix.solver }}-${{ matrix.platform }})..."
          echo "Benchmarks: ${{ matrix.benchmarks }}"

          set +e
          uv run python scripts/compare_vacask.py \
            --benchmark ${{ matrix.benchmarks }} \
            --use-scan \
            $SPARSE_FLAG \
            $GPU_FLAG \
            $PROFILE_FLAGS \
            --json-output /tmp/benchmark-summary.json 2>&1 | tee /tmp/benchmark-comparison.log
          BENCHMARK_STATUS=${PIPESTATUS[0]}
          set -e

          BENCHMARK_OK=false
          if grep -q "Summary (per-step timing)" /tmp/benchmark-comparison.log 2>/dev/null; then
            BENCHMARK_OK=true
            echo "Benchmarks completed successfully"
          fi

          if [ $BENCHMARK_STATUS -ne 0 ]; then
            echo "Benchmark script exited with status $BENCHMARK_STATUS"
            if [ "$BENCHMARK_OK" = true ]; then
              echo "Benchmark completed - likely a cleanup error, treating as success"
            else
              echo "ERROR: Benchmarks did not complete"
              exit $BENCHMARK_STATUS
            fi
          fi

      # ── Post-benchmark checks ────────────────────────────────────
      - name: Check for JIT recompilation
        if: always()
        run: |
          if [ -f /tmp/benchmark-comparison.log ]; then
            TOTAL=$(grep -c "Finished XLA compilation" /tmp/benchmark-comparison.log 2>/dev/null || echo 0)
            echo "Total XLA compilations: $TOTAL"

            N_BENCHMARKS=$(echo "${{ matrix.benchmarks }}" | tr ',' '\n' | wc -l | tr -d ' ')
            echo "Benchmarks in this job: $N_BENCHMARKS"

            SIMULATION_FNS=$(grep "Finished XLA compilation" /tmp/benchmark-comparison.log 2>/dev/null | \
              sed 's/.*of jit(\([^)]*\)).*/\1/' | \
              grep -E '(full_mna|nr_solve|scan_body|step_fn|transient|simulate|warmup|_solve_step|_time_step)' || true)

            if [ -n "$SIMULATION_FNS" ]; then
              UNIQUE_SIM=$(echo "$SIMULATION_FNS" | sort -u | wc -l | tr -d ' ')
              TOTAL_SIM=$(echo "$SIMULATION_FNS" | wc -l | tr -d ' ')

              echo "Simulation function compilations: $TOTAL_SIM (unique: $UNIQUE_SIM, expected per fn: <=$N_BENCHMARKS)"

              UNEXPECTED=$(echo "$SIMULATION_FNS" | sort | uniq -c | sort -rn | \
                awk -v max="$N_BENCHMARKS" '$1 > max {print "  " $1 "x: " $2 " (expected <=" max ")"}')

              if [ -n "$UNEXPECTED" ]; then
                UNEXPECTED_COUNT=$(echo "$UNEXPECTED" | wc -l | tr -d ' ')
                echo "::warning::Detected $UNEXPECTED_COUNT simulation function(s) with unexpected recompilations"
                echo "Functions exceeding expected compilation count:"
                echo "$UNEXPECTED"
              else
                echo "No unexpected recompilations (all within $N_BENCHMARKS benchmark limit)"
              fi
            else
              echo "No simulation function compilations found in log"
            fi
          fi

      - name: Report XLA cache status
        if: always()
        run: |
          echo "=== XLA Compilation Cache Status ==="
          echo "Cache directory: ${JAX_COMPILATION_CACHE_DIR}"

          if [ -d "${JAX_COMPILATION_CACHE_DIR}" ]; then
            CACHE_SIZE=$(du -sh "${JAX_COMPILATION_CACHE_DIR}" 2>/dev/null | cut -f1 || echo "empty")
            CACHE_FILES=$(find "${JAX_COMPILATION_CACHE_DIR}" -type f 2>/dev/null | wc -l || echo 0)
            echo "Cache size: ${CACHE_SIZE}"
            echo "Cached artifacts: ${CACHE_FILES}"
          else
            echo "Cache directory not found (first run or cache miss)"
          fi

      # ── Summary ─────────────────────────────────────────────────
      - name: Generate comparison summary
        if: always()
        run: |
          {
            echo "## Benchmark: ${{ matrix.solver }}-${{ matrix.platform }}"
            echo ""
            echo "### Environment"
            echo "- **Platform**: ${{ matrix.platform == 'cuda' && 'GPU (nvidia-runner-1)' || 'CPU (GitHub Actions runner)' }}"
            echo "- **JAX Backend**: ${{ matrix.platform }}"
            echo "- **Solver**: ${{ matrix.solver }}"
            echo "- **Mode**: lax.scan (JIT-compiled)"
            echo "- **Benchmarks**: ${{ matrix.benchmarks }}"
            echo ""

            # VACASK result accuracy (CPU dense only)
            if [ -f "/tmp/vacask-result-tests.log" ]; then
              echo "### Result Accuracy (vs VACASK)"
              echo ""
              echo "| Benchmark | Solver | RMS Error | Threshold | Status |"
              echo "|-----------|--------|-----------|-----------|--------|"

              awk '
                /comparison summary:/ {
                  match($0, /([A-Z0-9_]+) comparison summary/, arr)
                  if (arr[1] != "") bench = tolower(arr[1])
                }
                /: [0-9]+\.[0-9]+% \(max allowed: [0-9]+%\)/ {
                  match($0, /([a-z]+): ([0-9.]+)% \(max allowed: ([0-9]+)%\)/, arr)
                  if (arr[1] != "") {
                    printf "| %s | %s | %s%% | %s%% | PASS |\n", bench, arr[1], arr[2], arr[3]
                    bench = ""
                  }
                }
              ' /tmp/vacask-result-tests.log

              grep -oP 'test_transient_matches_vacask\[\K[^\]]+' /tmp/vacask-result-tests.log | sort -u | while read -r bench; do
                if grep -q "test_transient_matches_vacask\[${bench}\].*XFAIL" /tmp/vacask-result-tests.log; then
                  echo "| ${bench} | - | - | - | XFAIL |"
                elif grep -q "test_transient_matches_vacask\[${bench}\].*FAILED" /tmp/vacask-result-tests.log; then
                  echo "| ${bench} | - | - | - | FAILED |"
                fi
              done

              echo ""
            fi

            if [ -f "/tmp/benchmark-comparison.log" ]; then
              if grep -q "VACASK binary: NOT FOUND" /tmp/benchmark-comparison.log; then
                echo "### VACASK Binary Not Found"
                echo ""
                echo "VACASK simulator binary was not built. Check the Build VACASK step."
                echo ""
              elif grep -q "\.osdi' not found" /tmp/benchmark-comparison.log; then
                echo "### VACASK OSDI Files Missing"
                echo ""
                echo "OSDI device files are missing. VAJAX-only results shown."
                echo ""
              fi

              echo "### Per-Step Timing"
              echo ""
              echo "| Benchmark | Steps | VAJAX (ms/step) | VACASK (ms/step) | Ratio |"
              echo "|-----------|-------|---------------------|------------------|-------|"

              grep -A 10 "Summary (per-step timing)" /tmp/benchmark-comparison.log | \
                grep "^|" | tail -n +3 | while read -r line; do
                echo "$line"
              done

              echo ""
              echo "### Total Wall Time"
              echo ""
              echo "| Benchmark | Steps | VAJAX (ms) | VACASK (ms) | Ratio |"
              echo "|-----------|-------|----------------|-------------|-------|"

              grep -A 10 "Summary (total wall time)" /tmp/benchmark-comparison.log | \
                grep "^|" | tail -n +3 | while read -r line; do
                echo "$line"
              done

              echo ""
              echo "### Interpretation"
              echo ""
              echo "- **Ratio < 1.0**: VAJAX is faster"
              echo "- **Ratio > 1.0**: VAJAX is slower (overhead-dominated for small circuits)"
              echo "- **N/A**: VACASK comparison not available"
            else
              echo "**Error**: Benchmark comparison log not found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Artifacts ───────────────────────────────────────────────
      - name: Upload benchmark logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-logs-${{ matrix.solver }}-${{ matrix.platform }}
          path: |
            /tmp/benchmark-comparison.log
            /tmp/vacask-result-tests.log

      - name: Upload benchmark summary JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-summary-${{ matrix.solver }}-${{ matrix.platform }}
          path: /tmp/benchmark-summary.json
          if-no-files-found: ignore

      - name: Upload profiling traces
        if: always() && matrix.platform == 'cuda' && matrix.solver == 'sparse'
        uses: actions/upload-artifact@v4
        with:
          name: profiling-traces-${{ github.sha }}
          path: /tmp/vajax-traces/
          if-no-files-found: ignore
          retention-days: 30
