name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # =========================================================================
  # Step 0: Wait for CI workflows to pass on this commit
  # =========================================================================
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI checks to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Waiting for CI checks on $SHA ..."
          REQUIRED_WORKFLOWS=("Lint" "Tests")
          for workflow in "${REQUIRED_WORKFLOWS[@]}"; do
            echo "Checking: $workflow"
            for i in $(seq 1 60); do
              # Find the latest run for this workflow on this SHA
              RUN=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&event=push" \
                --jq ".workflow_runs[] | select(.name == \"$workflow\") | {status, conclusion}" \
                | head -1)
              STATUS=$(echo "$RUN" | jq -r '.status // empty')
              CONCLUSION=$(echo "$RUN" | jq -r '.conclusion // empty')
              if [ "$STATUS" = "completed" ]; then
                if [ "$CONCLUSION" = "success" ]; then
                  echo "  $workflow: passed"
                  break
                else
                  echo "  $workflow: failed ($CONCLUSION)"
                  exit 1
                fi
              fi
              echo "  $workflow: $STATUS (attempt $i/60, waiting 30s...)"
              sleep 30
            done
            if [ "$STATUS" != "completed" ]; then
              echo "  $workflow: timed out waiting"
              exit 1
            fi
          done
          echo "All CI checks passed!"

  # =========================================================================
  # Step 1: Patch version strings across all packages from the git tag
  # =========================================================================
  set-version:
    needs: check-ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Full history for hatch-vcs

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch version strings
        run: uv run --no-project python scripts/set_release_version.py "$GITHUB_REF_NAME"

      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: patched-source
          path: |
            openvaf_jax/openvaf_py/pyproject.toml
            openvaf_jax/openvaf_py/Cargo.toml
            openvaf_jax/osdi_py/pyproject.toml
            openvaf_jax/osdi_py/Cargo.toml
            vajax/sparse/pyproject.toml

  # =========================================================================
  # Step 2: Build wheels in parallel
  # =========================================================================

  # --- vajax (pure Python) ---
  build-vajax:
    needs: set-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for hatch-vcs

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-vajax
          path: dist/*

  # --- osdi-py (Rust + maturin, no external deps) ---
  build-osdi-py:
    needs: set-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download patched versions
        uses: actions/download-artifact@v4
        with:
          name: patched-source
          path: .

      - uses: astral-sh/setup-uv@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        with:
          package-dir: openvaf_jax/osdi_py
          output-dir: dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-osdi-py-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  # --- openvaf-py (Rust + maturin, vendored OpenVAF submodule) ---
  build-openvaf-py:
    needs: set-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download patched versions
        uses: actions/download-artifact@v4
        with:
          name: patched-source
          path: .

      - uses: astral-sh/setup-uv@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        with:
          package-dir: openvaf_jax/openvaf_py
          output-dir: dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-openvaf-py-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  # --- umfpack-jax (C++ + scikit-build-core, statically linked SuiteSparse) ---
  build-umfpack-jax:
    needs: set-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download patched versions
        uses: actions/download-artifact@v4
        with:
          name: patched-source
          path: .

      - uses: astral-sh/setup-uv@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        with:
          package-dir: vajax/sparse
          output-dir: dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-umfpack-jax-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  # =========================================================================
  # Step 2.5: Test wheel installation before publishing
  # =========================================================================
  test-wheel-install:
    needs: [build-vajax, build-openvaf-py, build-osdi-py, build-umfpack-jax]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true

      - name: Install wheels in fresh venv
        run: |
          uv venv /tmp/test-venv --python 3.12
          # Use --find-links so uv picks the correct platform wheel automatically
          uv pip install --python /tmp/test-venv/bin/python \
            --find-links wheels/ vajax openvaf-py osdi-py umfpack-jax

      - name: Verify imports and bundled models
        env:
          JAX_PLATFORMS: cpu
        run: |
          /tmp/test-venv/bin/python -c "
          import vajax
          print(f'vajax {vajax.__version__} imported OK')

          from vajax.analysis.openvaf_models import MODEL_PATHS, _BUNDLED_MODELS_DIR
          print(f'MODEL_PATHS has {len(MODEL_PATHS)} entries')

          missing = []
          for name, (base_key, rel_path) in MODEL_PATHS.items():
              if base_key == 'bundled':
                  if not (_BUNDLED_MODELS_DIR / rel_path).exists():
                      missing.append(name)
          assert not missing, f'Missing bundled models: {missing}'
          print(f'All bundled models present')

          import openvaf_py
          print(f'openvaf_py imported OK')
          "

  # =========================================================================
  # Step 3: Publish to TestPyPI (per-package for independent OIDC tokens)
  # =========================================================================
  publish-testpypi-vajax:
    needs: [build-vajax, test-wheel-install]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-vajax
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  publish-testpypi-osdi-py:
    needs: [build-osdi-py, test-wheel-install]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-osdi-py-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  publish-testpypi-openvaf-py:
    needs: [build-openvaf-py, test-wheel-install]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-openvaf-py-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  publish-testpypi-umfpack-jax:
    needs: [build-umfpack-jax, test-wheel-install]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-umfpack-jax-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  # =========================================================================
  # Step 4: Publish to PyPI (per-package for independent OIDC tokens)
  # =========================================================================
  publish-pypi-vajax:
    needs: [publish-testpypi-vajax]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-vajax
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-pypi-osdi-py:
    needs: [publish-testpypi-osdi-py]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-osdi-py-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-pypi-openvaf-py:
    needs: [publish-testpypi-openvaf-py]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-openvaf-py-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-pypi-umfpack-jax:
    needs: [publish-testpypi-umfpack-jax]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-umfpack-jax-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  # =========================================================================
  # Step 5: Create GitHub Release
  # =========================================================================
  github-release:
    needs: [publish-pypi-vajax, publish-pypi-osdi-py, publish-pypi-openvaf-py, publish-pypi-umfpack-jax]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "VAJAX $GITHUB_REF_NAME" \
            --generate-notes \
            dist/*

  # =========================================================================
  # Step 6: Build and deploy docs to GitHub Pages
  # =========================================================================
  deploy-docs:
    needs: [publish-pypi-vajax, publish-pypi-osdi-py, publish-pypi-openvaf-py, publish-pypi-umfpack-jax]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --extra docs --no-install-workspace --no-build-package openvaf-py --no-build-package osdi-py --no-build-package umfpack-jax

      - name: Build docs
        run: .venv/bin/mkdocs build --site-dir ./site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages

  # =========================================================================
  # Step 7: Update Homebrew tap
  # =========================================================================
  update-homebrew:
    needs: [publish-pypi-vajax, publish-pypi-osdi-py, publish-pypi-openvaf-py, publish-pypi-umfpack-jax, set-version]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Wait for PyPI to propagate
          sleep 30
          gh api repos/ChipFlow/homebrew-tap/dispatches \
            -f event_type=update-vajax \
            -f "client_payload[version]=${{ needs.set-version.outputs.version }}"
