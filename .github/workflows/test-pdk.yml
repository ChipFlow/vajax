name: PDK Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pdk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Disabled sccache due to GitHub artifact cache outage (Dec 2025)
  # Re-enable when service is restored
  SCCACHE_GHA_ENABLED: "false"
  RUSTC_WRAPPER: "sccache"
  # Disable XLA compilation cache to avoid CPU architecture mismatches
  # GitHub Actions runners have varying CPU features across runs
  JAX_COMPILATION_CACHE_DIR: ""

jobs:
  test-pdk:
    runs-on: ubuntu-latest
    # Only run on internal PRs (not forks) where secrets are available
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup SSH for private repos
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PDK_DEPLOY_KEY }}

      - name: Clone GF130 PDK (sparse checkout)
        run: |
          # Use sparse checkout to only fetch Verilog-A model directories
          git clone --quiet --filter=blob:none --sparse git@github.com:ChipFlow/pdk-gf130.git /tmp/pdk-gf130
          cd /tmp/pdk-gf130
          git sparse-checkout set --no-cone '*/Models/HSPICE' '*/Models/Spectre'
          echo "PDK_GF130_PATH=/tmp/pdk-gf130" >> $GITHUB_ENV
          # Mask PDK path in all subsequent log output
          echo "::add-mask::/tmp/pdk-gf130"

      - name: Install apt dependencies
        uses: robtaylor/cache-apt-pkgs-action@feat/apt-sources
        with:
          packages: llvm-18-dev clang-18 libclang-18-dev lld-18
          apt-sources: |
            https://apt.llvm.org/llvm-snapshot.gpg.key | deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main
          execute_install_scripts: true

      - name: Set LLVM environment
        run: echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            OpenVAF
            openvaf_jax/openvaf_py

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          prune-cache: false
          python-version: "3.10"

      - name: Set up Python
        run: uv python install 3.10

      - name: Build and install openvaf-py
        working-directory: openvaf_jax/openvaf_py
        run: |
          uv sync
          uv run maturin develop --release

      - name: Run PDK tests
        working-directory: openvaf_jax/openvaf_py
        # Use --tb=line for minimal tracebacks to avoid leaking paths
        run: uv run pytest tests_pdk/ -v --tb=line
